meters:
  - name: api_requests
    unit: request
    aggregation: sum
    dimensions:
      - api_product
      - environment
  - name: connected_devices
    unit: device-month
    aggregation: max
    dimensions:
      - api_product
      - region
  - name: voice_minutes
    unit: minute
    aggregation: sum
    dimensions:
      - direction
      - region
principles:
  - name: Visibility
    description: Verizon does not expose a public usage API for these products; consumption is reported
      through the Verizon Enterprise Center / My Business invoice and the per-product portals (e.g.
      ThingSpace dashboard).
  - name: Allocation
    description: Tag spend at the contract / billing-account level using the cost-center mapping in
      My Business; sub-account splits typically require a separate billing account from Verizon.
  - name: Optimization
    description: Optimization levers are commercial — committed-volume rate cards in the master
      agreement, retiring unused SIMs / lines, and consolidating ThingSpace device pools.
  - name: Accountability
    description: Spend ownership sits with the named Verizon Business account executive on the
      consumer side; finance reconciles against the My Business monthly invoice.
