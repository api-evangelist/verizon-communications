description: FOCUS-aligned FinOps shape for Verizon Communications API products. Verizon does not
  publish self-service rates for its Network APIs, ThingSpace IoT, 5G Edge, TM Forum, or Voice (CPaaS)
  APIs; billing is governed by the enterprise master service agreement and per-product schedules.
sources:
  - https://www.verizon.com/business/products/internet-of-things/
notes: No public unit prices or invoice line definitions were available at reconciliation time.
  The meter list captures the categories Verizon contracts typically bill against.
billingModel:
  pricingCategory: Contract / Custom
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
    - Usage
