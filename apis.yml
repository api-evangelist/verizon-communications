aid: verizon-communications
name: Verizon Communications
description: >-
  Verizon Communications is one of the world's leading providers of technology
  and communications services, offering wireless, wireline, broadband, and global
  enterprise services to consumers, businesses, and government customers. Verizon
  exposes developer APIs for network capabilities including SIM swap detection,
  number verification, IoT device management via ThingSpace, 5G edge computing,
  contact center voice APIs, and TM Forum-certified service management APIs for
  enterprise customers.
url: https://raw.githubusercontent.com/api-evangelist/verizon-communications/refs/heads/main/apis.yml
created: '2026-05-03'
modified: '2026-05-03'
specificationVersion: '0.19'
tags:
  - Telecommunications
  - Wireless
  - Network APIs
  - IoT
  - 5G
  - Enterprise
  - Identity
apis:
  - aid: verizon-communications:network-apis
    name: Verizon Network APIs
    description: >-
      Verizon Network APIs provide authentication, fraud prevention, and device
      intelligence capabilities leveraging Verizon's mobile network. Includes
      Number Verification API for seamless device authentication and SIM Swap API
      for detecting fraudulent account takeovers.
    humanURL: https://www.verizon.com/business/solutions/network-apis/
    tags:
      - Network APIs
      - Authentication
      - Fraud Prevention
      - Identity
      - SIM Swap
      - Number Verification
    properties:
      - type: Documentation
        url: https://www.verizon.com/business/solutions/network-apis/
      - type: Portal
        url: https://developers.verizon.com/

  - aid: verizon-communications:thingspace
    name: Verizon ThingSpace IoT API
    description: >-
      ThingSpace gives organizations of all sizes tools to build IoT solutions,
      manage connected devices, and solve business problems end-to-end. Provides
      device connectivity management, diagnostics, software management, and
      location services for IoT deployments.
    humanURL: https://thingspace.verizon.com
    tags:
      - IoT
      - Device Management
      - Connectivity
      - Wireless
    properties:
      - type: Documentation
        url: https://thingspace.verizon.com/resources/documentation/connectivity/API_Reference/
      - type: Portal
        url: https://thingspace.verizon.com
      - type: APIReference
        url: https://thingspace.verizon.com/resources/documentation/connectivity/API_Console/

  - aid: verizon-communications:5g-edge
    name: Verizon 5G Edge API
    description: >-
      Verizon 5G Edge API enables developers to build ultra-low-latency applications
      by leveraging Verizon's multi-access edge computing (MEC) infrastructure.
      Provides discovery, session management, and location services for 5G edge
      compute workloads.
    humanURL: https://www.verizon.com/business/5g-edge-portal/api-documentation.html
    tags:
      - 5G
      - Edge Computing
      - MEC
      - Ultra-Low Latency
    properties:
      - type: Documentation
        url: https://www.verizon.com/business/5g-edge-portal/api-documentation.html
      - type: APIReference
        url: https://www.verizon.com/business/5g-edge-portal/documentation/verizon-5g-edge-discovery-service/api-reference.html
      - type: Portal
        url: https://www.verizon.com/business/5g-edge-portal/index.html

  - aid: verizon-communications:service-management
    name: Verizon TM Forum Service Management APIs
    description: >-
      Verizon provides a suite of TM Forum certified service management APIs
      exposing ITIL functions for inventory management, incident management,
      change management, event management, problem management, order management,
      and billing management. APIs are bi-directional and keep Verizon and
      customer systems synchronized.
    humanURL: https://developers.verizon.com/
    tags:
      - TM Forum
      - ITIL
      - Service Management
      - Enterprise
      - B2B
    properties:
      - type: Documentation
        url: https://developers.verizon.com/
      - type: APIReference
        url: https://developers.verizon.com/

  - aid: verizon-communications:voice-api
    name: Verizon Voice API (CPaaS)
    description: >-
      Verizon Communications Platform as a Service (CPaaS) offering provides
      APIs for inbound and outbound IP interactive voice response (IPIVR) and
      call detail reporting. Available exclusively for IP Contact Center (IPCC)
      customers to build customized communication solutions.
    humanURL: https://www.verizon.com/business/products/contact-center-cx/voice-api/
    tags:
      - CPaaS
      - Voice
      - Contact Center
      - IVR
      - Communications
    properties:
      - type: Documentation
        url: https://www.verizon.com/business/products/contact-center-cx/voice-api/

