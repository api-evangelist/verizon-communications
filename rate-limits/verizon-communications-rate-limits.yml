specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Verizon Communications
providerId: verizon-communications
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Rate Limiting
  - Telecommunications
  - Network APIs
  - IoT
  - 5G
  - Enterprise
description: Verizon Communications does not publish a single, public rate-limit table covering its
  Network APIs, ThingSpace IoT, 5G Edge, TM Forum, or Voice (CPaaS) API products. Concrete limits are
  set in the enterprise contract and surfaced through the developer portal once an account is provisioned.
sources:
  - https://www.verizon.com/business/products/internet-of-things/
responseCodes:
  throttled: 429
limits:
  - name: Per-service quotas
    scope: contract
    metric: varies
    limit: see contract / developer portal once provisioned
    notes: Not published publicly; varies per API product (Network APIs, ThingSpace, 5G Edge, TM Forum,
      Voice CPaaS) and per negotiated tier.
policies:
  - name: Contractual scoping
    description: Rate limits are set in the master service agreement and product schedules; consumers
      should consult their Verizon Business account team for product-specific quotas.
  - name: Backoff
    description: On 429 responses, clients should implement exponential backoff with jitter and honor
      any Retry-After header returned by the gateway.
maintainers:
